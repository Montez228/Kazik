<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍋 ПУЛЬТ КЕРУВАННЯ ЛИМОНОМ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="min-h-screen">

    <!-- Password Lock -->
    <div id="lock-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 p-6">
        <div class="glass p-10 rounded-3xl w-full max-w-sm text-center border-yellow-500/20 border-2">
            <h2 class="text-3xl font-black mb-6 italic text-yellow-400">ВХІД В СИСТЕМУ</h2>
            <input type="password" id="admin-pass" placeholder="Введіть пароль"
                class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-yellow-500 text-center font-bold">
            <button onclick="checkPass()"
                class="w-full bg-yellow-500 text-slate-950 font-black p-4 rounded-xl hover:scale-105 transition-all uppercase">Увійти</button>
            <p id="lock-error" class="mt-4 text-red-500 text-xs font-bold hidden">Невірний пароль!</p>
        </div>
    </div>

    <!-- Admin Content (Hidden by default) -->
    <div id="admin-panel" class="hidden p-4 md:p-10 max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <div>
                <h1 class="text-3xl font-black italic text-yellow-400 opacity-90 tracking-tighter uppercase">🍋 ПУЛЬТ
                    КЕРУВАННЯ ЛИМОНОМ</h1>
                <p class="text-[10px] font-bold text-blue-400 tracking-widest uppercase">Система управління збором v1.0
                </p>
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-xs font-bold text-slate-500 hover:text-white transition-colors">🎰
                    ПОВЕРНУТИСЬ ДО ГРИ</a>
                <button onclick="location.reload()"
                    class="ml-4 text-xs font-bold text-slate-500 hover:text-white transition-colors">ВИЙТИ</button>
            </div>
        </header>

        <!-- Players Management -->
        <section class="glass p-8 rounded-3xl border-white/5 border">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                <h3 class="text-xl font-black italic text-blue-400 uppercase tracking-tight">Управління гравцями</h3>
                <input type="text" id="player-search" oninput="renderPlayers()" placeholder="Пошук за ніком..."
                    class="bg-slate-900 border border-white/10 px-6 py-3 rounded-xl text-sm font-bold outline-none focus:border-blue-500 w-full sm:w-64 transition-all">
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] font-black text-slate-500 uppercase border-b border-white/5">
                        <tr>
                            <th class="pb-4 px-2">Гравець</th>
                            <th class="pb-4 px-2">Баланс (🍋)</th>
                            <th class="pb-4 px-2 text-right">Нарахувати фішки</th>
                        </tr>
                    </thead>
                    <tbody id="players-list" class="divide-y divide-white/5">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Notification Container -->
    <div id="toast-container" class="fixed bottom-10 right-10 z-[200]"></div>

    <script>
        const SUPABASE_URL = 'https://huhilljlthphkmvgyqlv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1aGlsbGpsdGhwaGttdmd5cWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NzY5NzYsImV4cCI6MjA4NzQ1Mjk3Nn0.OgAcEX5nmEAHwONTLEhF5t_2v6yOdTYIWs5cy9tBpBw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allPlayers = [];

        function checkPass() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'lemon2026') {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                initAdmin();
            } else {
                const error = document.getElementById('lock-error');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        }

        async function initAdmin() {
            loadPlayers();
            supabaseClient.channel('admin-sync')
                .on('postgres_changes', { event: '*', table: 'profiles' }, loadPlayers)
                .subscribe();
        }

        async function loadPlayers() {
            const { data, error } = await supabaseClient.from('profiles').select('*').order('points', { ascending: false });
            if (data) {
                allPlayers = data;
                renderPlayers();
            }
        }

        function renderPlayers() {
            const query = document.getElementById('player-search').value.toLowerCase();
            const list = document.getElementById('players-list');
            list.innerHTML = '';

            allPlayers.filter(p => p.username.toLowerCase().includes(query)).forEach(p => {
                const row = document.createElement('tr');
                row.className = 'group hover:bg-white/[0.02] transition-all';
                row.innerHTML = `
                    <td class="py-4 px-2">
                        <div class="font-black text-white italic truncate max-w-[150px]">${p.username}</div>
                    </td>
                    <td class="py-4 px-2 font-black text-yellow-500">${p.points.toLocaleString()} 🍋</td>
                    <td class="py-4 px-2 text-right">
                        <div class="flex justify-end items-center gap-2">
                            <input type="number" id="manual-${p.username}" placeholder="+/-" class="bg-slate-900 border border-white/10 rounded-md py-2 px-3 text-xs w-24 outline-none focus:border-yellow-500 text-center font-bold">
                            <button onclick="adjustBalance('${p.username}')" class="bg-yellow-500 hover:bg-yellow-400 text-xs font-black px-4 py-2 rounded-md transition-all text-black uppercase">ОК</button>
                            <button onclick="deletePlayer('${p.username}')" class="bg-red-900/50 hover:bg-red-600 text-red-400 hover:text-white p-2 rounded-md transition-all ml-2" title="Видалити">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </td>
                `;
                list.appendChild(row);
            });
        }

        async function adjustBalance(username) {
            const player = allPlayers.find(p => p.username === username);
            const amount = parseInt(document.getElementById(`manual-${username}`).value);
            if (isNaN(amount)) return;

            const newTotal = player.points + amount;
            const { error } = await supabaseClient.from('profiles').update({ points: newTotal }).eq('username', username);
            if (!error) {
                showToast(`Баланс ${username} оновлено: ${newTotal} 🍋`, 'success');
                document.getElementById(`manual-${username}`).value = '';
            } else {
                showToast('Помилка оновлення!', 'error');
            }
        }

        async function deletePlayer(username) {
            if (!confirm(`Видалити гравця ${username}?`)) return;
            const { error } = await supabaseClient.from('profiles').delete().eq('username', username);
            if (!error) showToast(`Гравця ${username} видалено`, 'warning');
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : (type === 'warning' ? 'bg-orange-600' : 'bg-red-600');
            toast.className = `${bgColor} text-white px-6 py-3 rounded-xl shadow-2xl mb-3 font-black text-xs animate-bounce`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>

</html>
